version: 2

models:
  - name: fct_team_week_epa
    description: "One row per team per week, aggregating play-level EPA into team performance."
    columns:
      - name: team
        data_tests:
          - not_null
      - name: week
        data_tests:
          - not_null
      - name: plays
        data_tests:
          - not_null

  - name: fct_player_week
    description: "One row per player per week, with roster status. Feeds the fantasy football ML project downstream."
    columns:
      - name: player_id
        description: "Null for a small number of Development Squad / IPP players who fall outside the standard roster ID system."
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: week
        data_tests:
          - not_null
      - name: sleeper_id
        data_tests:
          - not_null:
              config:
                severity: warn