version: 2

models:
  - name: stg_pbp
    description: "Cleaned play-by-play data, one row per play."
    columns:
      - name: game_id
        description: "Unique identifier for the game."
        data_tests:
          - not_null
      - name: play_type
        description: "Type of play (pass, run, punt, etc.)."
        data_tests:
          - not_null
      - name: epa
        description: "Expected points added for the play."

  - name: stg_rosters
    description: "Cleaned weekly roster data, one row per player per week."
    columns:
      - name: player_id
        description: "Unique identifier for the player. Null for a small number of Development Squad / IPP players who fall outside the standard roster ID system."
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: team
        description: "Team abbreviation."
        data_tests:
          - not_null

  - name: stg_sleeper_rosters
    description: "Cleaned live snapshot of my Sleeper league's rosters. One row per rostered player. Only includes players currently on a roster in the league -- not the full NFL player pool."
    columns:
      - name: roster_id
        description: "Sleeper's internal ID for a team/roster in the league."
        data_tests:
          - not_null
      - name: sleeper_id
        description: "Player ID, matches sleeper_id in stg_rosters/fct_player_week."
        data_tests:
          - not_null